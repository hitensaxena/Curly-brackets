<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drift Room</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 200, 160, 0.8), transparent 24%),
          radial-gradient(circle at 80% 30%, rgba(170, 220, 255, 0.8), transparent 24%),
          radial-gradient(circle at 60% 70%, rgba(255, 255, 255, 0.45), transparent 20%),
          linear-gradient(180deg, #2b2d42, #1f2937);
        color: white;
        font-family: Helvetica, Arial, sans-serif;
      }

      .panel {
        width: min(80vw, 580px);
        padding: 2rem;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(18px);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <p>Drift Room</p>
      <h1>A softer spatial experiment with floating gradients and quiet motion.</h1>
    </div>
  </body>
</html>
