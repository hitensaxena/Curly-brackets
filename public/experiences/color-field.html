<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Color Field</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, #ffd6a5, transparent 30%),
          radial-gradient(circle at bottom right, #9bf6ff, transparent 28%),
          linear-gradient(135deg, #22223b, #4a4e69 55%, #9a8c98);
        font-family: Helvetica, Arial, sans-serif;
        color: white;
      }

      .panel {
        width: min(80vw, 560px);
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(18px);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <p>Color Field</p>
      <h1>A minimal embedded placeholder for an interactive web piece.</h1>
    </div>
  </body>
</html>
